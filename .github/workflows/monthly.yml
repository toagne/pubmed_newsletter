name: Monthly Newsletter

on:
  schedule:
    - cron: "0 7 1 * *" # 07:00 UTC on day 1 of every month

  workflow_dispatch: # "Run workflow" button for test/debug/rerun without waiting for next scheduled run

jobs:
  run:
    runs-on: ubuntu-latest # virtual machine

    timeout-minutes: 120

    steps:
      - name: Checkout repo # copy everything on vm
        uses: actions/checkout@v4

      - name: Set up Python # install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies  # install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monthly pipeline
        env: # inject secrets
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

        run: python scripts/run_scheduler.py # run the actual file